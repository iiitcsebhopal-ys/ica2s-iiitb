<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submissions List - ICA2S 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="favicon/favicon.ico" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Work+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="scripts/script.js" defer></script>

</head>

<body style="padding-top: 0px; margin: 0px;">
    <!-- Fixed Navigation -->
    <div id="navbar-placeholder"></div>

    <section class="mainn" style="margin: 0; padding: 120px 0 60px; background: var(--light-bg); min-height: 100vh;">
        <div class="section-container" style="max-width: 1000px;">
            <div class="section-header">
                <span class="section-badge">Records</span>
                <h2 class="section-title">Submitted Papers</h2>
                <p class="section-description">A complete list of manuscripts submitted for ICA2S 2026, ordered by most
                    recent.</p>
            </div>

            <div class="table-wrapper">

                <table class="submission-table">
                    <thead>
                        <tr>
                            <th>S.No.</th>
                            <th>Post Title</th>
                            <th>Date of Submission</th>
                            <th>Files Attached</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Content populated via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer-placeholder"></div>


</body>

</html>
